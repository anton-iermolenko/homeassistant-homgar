name: New Device Support Request
description: Request support for a new RainPoint/HomGar device
title: "[Device Support]: "
labels: ["enhancement", "new-device"]
body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for requesting support for a new device!
        
        To help us implement the decoder as quickly as possible, please provide the following information.
        
        **Important:** Screenshots from the RainPoint or HomGar app showing actual readings are essential. Raw payloads alone cannot tell us what values the bytes represent — we need to see what the app displays alongside the payload to map the byte offsets to the correct sensor values.
        
        The more payload+screenshot pairs you provide (in different states), the faster and more accurate the implementation will be.
  
  - type: input
    id: device_model
    attributes:
      label: Device Model Number
      description: What is the exact model number printed on your device?
      placeholder: "e.g., HTV0542FRF, HCS0528ARF, HCS014ARF"
    validations:
      required: true
  
  - type: dropdown
    id: device_category
    attributes:
      label: Device Category
      description: What type of device is this?
      options:
        - Valve/Irrigation Controller
        - Moisture Sensor
        - Temperature/Humidity Sensor
        - Rain Gauge
        - Flow Meter
        - Pool Sensor
        - Other (please specify in description)
    validations:
      required: true
  
  - type: textarea
    id: device_description
    attributes:
      label: Device Description
      description: Brief description of the device and its features
      placeholder: "4-zone RF irrigation timer with individual zone control and scheduling"
    validations:
      required: true
  
  - type: textarea
    id: app_screenshots
    attributes:
      label: App Screenshots (REQUIRED)
      description: |
        **Screenshots from the RainPoint or HomGar app are required.** Without them we cannot decode the payload.
        
        Please attach screenshots showing:
        - The device detail screen with all current readings (temperature, moisture %, min/max values, etc.)
        - Screenshots in different states (e.g., different temperatures, valve open vs closed)
        - The device name and model as shown in the app
        
        **For each app screenshot, also include the corresponding HA debug log payload from that same moment.**
      placeholder: |
        Screenshot 1: App showing Pool Temp = 32.9°C, Max = 34.9°C, Min = 29.0°C
        (attach image)
        
        Screenshot 2: App showing Soil Moisture = 45%
        (attach image)
    validations:
      required: true

  - type: textarea
    id: payload_samples
    attributes:
      label: Payload Samples (REQUIRED)
      description: |
        **Provide payloads from HA debug logs that match your app screenshots above.**
        
        **How to get payloads:**
        1. Enable debug logging in Home Assistant (Configuration > Logs > Set custom_components.homgar to DEBUG)
        2. Look for lines like: `Decoding payload for model=... value='10#...'`
        3. Copy the full payload value
        4. Note what the app showed at that same time
        
        **For valve controllers:** Provide samples with different zones open/closed
        **For sensors:** Provide samples at different readings alongside app screenshots
      placeholder: |
        Sample 1 (app shows Pool Temp = 32.9°C, Max = 34.9°C, Min = 29.0°C):
        10#E74A03B403DC01B805859003FF0F99620F19
        
        Sample 2 (app shows Pool Temp = 31.2°C):
        10#...
        
        Sample 3 (describe what app shows):
        ...
      render: shell
    validations:
      required: true
  
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should this device display in Home Assistant? What entities should be created?
      placeholder: |
        - Zone 1 valve entity (open/closed state)
        - Zone 2 valve entity (open/closed state)
        - Zone 3 valve entity (open/closed state)
        - Zone 4 valve entity (open/closed state)
        - Hub online status
        - Signal strength (RSSI)
    validations:
      required: true
  
  - type: textarea
    id: current_behavior
    attributes:
      label: Current Behavior
      description: What is currently happening with this device in Home Assistant?
      placeholder: |
        - Device shows as "Unknown device model"
        - No entities are created
        - Error in logs: "No decoder found for model HTV0542FRF"
    validations:
      required: true
  
  - type: textarea
    id: logs
    attributes:
      label: Home Assistant Debug Logs
      description: |
        Please paste relevant logs with debug logging enabled.
        Include any errors or warnings related to this device.
      placeholder: |
        2026-04-06 10:00:00 DEBUG (MainThread) [custom_components.homgar.coordinator] Decoding payload for model=HTV0542FRF...
        2026-04-06 10:00:00 ERROR (MainThread) [custom_components.homgar] No decoder found for model: HTV0542FRF
      render: shell
    validations:
      required: false
  
  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      description: What version of the HomGar/RainPoint integration are you using?
      placeholder: "2.0.3"
    validations:
      required: true
  
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: What version of Home Assistant are you running?
      placeholder: "2024.4.0"
    validations:
      required: true
  
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other information that might be helpful (screenshots, app behavior, etc.)
    validations:
      required: false
  
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      description: Please confirm you have completed the following
      options:
        - label: I have attached screenshots from the RainPoint/HomGar app showing actual readings
          required: true
        - label: I have provided payloads from HA debug logs that match my app screenshots
          required: true
        - label: I have included the exact device model number
          required: true
        - label: I have described what the device should display in Home Assistant
          required: true
        - label: I have checked that this device is not already supported
          required: true
