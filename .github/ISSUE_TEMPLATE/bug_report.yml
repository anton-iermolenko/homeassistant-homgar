name: Bug Report
description: Report a bug or issue with the integration
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for reporting a bug!
        
        Please provide as much detail as possible to help us identify and fix the issue.

        **Latest released integration version:** `3.0.24`
        
        Please update to the latest release and restart Home Assistant before opening a bug report.
  
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: "The valve shows as 'open' in Home Assistant but is actually closed"
    validations:
      required: true
  
  - type: input
    id: device_model
    attributes:
      label: Affected Device Model
      description: Which device model is experiencing the issue?
      placeholder: "e.g., HTV213FRF, HCS0528ARF"
    validations:
      required: true
  
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Open valve zone 1 using the app
        2. Check Home Assistant entity state
        3. Entity shows 'closed' instead of 'open'
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
      placeholder: "Valve entity should show 'open' state when zone is activated"
    validations:
      required: true
  
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
      placeholder: "Valve entity shows 'closed' state even when zone is running"
    validations:
      required: true
  
  - type: textarea
    id: app_screenshots
    attributes:
      label: App Screenshots (REQUIRED for sensor/value bugs)
      description: |
        **If your bug involves incorrect sensor values or unknown readings, screenshots from the RainPoint or HomGar app are essential.**
        
        Please attach screenshots showing:
        - The current reading the app displays (e.g., temperature 32.9°C)
        - Any min/max or historical values shown in the app
        - The device detail screen
        
        Without app screenshots we cannot verify what the correct decoded values should be — raw payloads alone are not enough to reverse-engineer sensor readings.
      placeholder: |
        Attach screenshots here. For example:
        - App shows Pool Temperature: 32.9°C (Max: 34.9°C, Min: 29.0°C)
        - HA shows: Unknown
    validations:
      required: false

  - type: textarea
    id: payload_samples
    attributes:
      label: Payload Samples (if applicable)
      description: |
        If the issue involves incorrect decoding, please provide payload samples from the HA debug logs.
        Include samples that demonstrate the bug alongside the app screenshots above.
      placeholder: |
        Payload when bug occurs (from HA debug logs):
        01#17E1CA0019D8111AD8001BD8001CD8001D201E201F20202018DC0121B75BBADC16...
        
        Expected state (from app): Zone 1 open
        Actual state shown in HA: Zone 1 closed
      render: shell
    validations:
      required: false
  
  - type: textarea
    id: logs
    attributes:
      label: Home Assistant Logs
      description: |
        Please paste relevant logs with debug logging enabled if possible.
        Configuration > Logs > Set custom_components.homgar to DEBUG
      placeholder: |
        2026-04-06 10:00:00 DEBUG (MainThread) [custom_components.homgar] ...
        2026-04-06 10:00:00 ERROR (MainThread) [custom_components.homgar] ...
      render: shell
    validations:
      required: false
  
  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      description: What exact version of the HomGar/RainPoint integration are you using? Latest release is 3.0.24.
      placeholder: "e.g. 3.0.24"
    validations:
      required: true
  
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: What version of Home Assistant are you running?
      placeholder: "2024.4.0"
    validations:
      required: true
  
  - type: dropdown
    id: installation_method
    attributes:
      label: Installation Method
      description: How did you install the integration?
      options:
        - HACS
        - Manual
    validations:
      required: true
  
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other information that might be helpful (screenshots, workarounds, etc.)
    validations:
      required: false
  
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have updated to the latest released version (3.0.24) and restarted Home Assistant
          required: true
        - label: I have provided steps to reproduce the issue
          required: true
        - label: I have included the integration version
          required: true
        - label: For sensor value bugs, I have attached screenshots from the RainPoint/HomGar app showing the correct values
          required: false
